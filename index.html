<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ЕГЭ по профильной математике 2027 через...</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            padding: 30px 20px;

            font-family: Arial, sans-serif;
            text-align: center;

            background-color: #f0f0f0;
        }

        #header {
            margin-bottom: 20px;
            font-size: 28px;
            font-weight: bold;
        }

        #timer {
            font-size: 48px;
            font-weight: bold;
        }

        #photo {
            width: 500px;
            max-width: 90%;
            max-height: 450px;

            margin-top: 40px;

            object-fit: cover;

            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        /* Адаптация для телефонов */
        @media (max-width: 600px) {
            #header {
                font-size: 22px;
            }

            #timer {
                font-size: 32px;
                line-height: 1.4;
            }

            #photo {
                margin-top: 30px;
            }
        }
    </style>
</head>

<body>

    <div id="header">
        ЕГЭ по профильной математике 2027 через...
    </div>

    <div id="timer">
        Загрузка...
    </div>

    <!-- Картинка под таймером -->
    <img
        id="photo"
        src="100points_ 196.jpg"
        alt="Легион Ильича"
    >

    <script>
        // 8 июня 2027 года, 10:00 по московскому времени
        const endDate = new Date("2027-06-08T10:00:00+03:00");

        function updateTimer() {
            const now = new Date();
            const remainingTime = endDate - now;

            if (remainingTime <= 0) {
                document.getElementById("timer").textContent =
                    "ЕГЭ начался! Удачи, Легион!";

                clearInterval(timerInterval);
                return;
            }

            const days = Math.floor(
                remainingTime / (1000 * 60 * 60 * 24)
            );

            const hours = Math.floor(
                (remainingTime % (1000 * 60 * 60 * 24)) /
                (1000 * 60 * 60)
            );

            const minutes = Math.floor(
                (remainingTime % (1000 * 60 * 60)) /
                (1000 * 60)
            );

            const seconds = Math.floor(
                (remainingTime % (1000 * 60)) / 1000
            );

            document.getElementById("timer").textContent =
                days + " дн. " +
                hours + " ч. " +
                minutes + " мин. " +
                seconds + " сек.";
        }

        updateTimer();

        const timerInterval = setInterval(updateTimer, 1000);
    </script>

</body>
</html>
